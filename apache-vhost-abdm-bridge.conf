# Apache VirtualHost Configuration for ABDM Bridge Gateway
# Location: /etc/apache2/sites-available/abdm-bridge.conf
# 
# To enable this site:
#   sudo a2ensite abdm-bridge.conf
#   sudo apache2ctl configtest
#   sudo systemctl restart apache2

# ==================== HTTP (Redirect to HTTPS) ====================
<VirtualHost *:80>
    ServerName abdm-bridge.e-atria.in
    ServerAlias www.abdm-bridge.e-atria.in
    ServerAdmin admin@e-atria.in
    
    DocumentRoot /var/www/html/abdm-bridge-gateway/public
    
    # Redirect all HTTP traffic to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/abdm-bridge-http-error.log
    CustomLog ${APACHE_LOG_DIR}/abdm-bridge-http-access.log combined
</VirtualHost>

## HTTPS disabled for now. Add a :443 VirtualHost later after SSL certificate creation.
